name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Bundle backend for Lambda
        run: |
          mkdir -p .lambda-build/backend
          cp -r backend/src .lambda-build/backend/
          cp backend/package.json backend/package-lock.json .lambda-build/backend/
          cd .lambda-build/backend && npm ci --omit=dev

      - name: Bundle thumbnail-generator for Lambda
        run: |
          mkdir -p .lambda-build/thumbnail-generator
          cp lambdas/thumbnail-generator/index.js lambdas/thumbnail-generator/package.json lambdas/thumbnail-generator/package-lock.json .lambda-build/thumbnail-generator/
          cd .lambda-build/thumbnail-generator && npm ci --omit=dev

      - name: CDK Deploy
        working-directory: infra
        run: npx cdk deploy --all --require-approval never

      - name: Get stack outputs
        id: stack-outputs
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks \
            --stack-name PortfolioStack \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name PortfolioStack \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/dist s3://${{ steps.stack-outputs.outputs.frontend_bucket }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"
          aws s3 cp frontend/dist/index.html s3://${{ steps.stack-outputs.outputs.frontend_bucket }}/index.html \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack-outputs.outputs.distribution_id }} \
            --paths "/*"
